---
- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:
    - name: copy war file to Tomcat
      copy:
        src: "/var/snap/jenkins/5004/workspace/2023MavenWebAppPipelineWithAnsible/target/2023MavenWebAppPipelineWithAnsible.war"
        dest: "/opt/tomcat/webapps/2023MavenWebAppPipelineWithAnsible.war"
        remote_src: no

    - name: Restart Tomcat
      shell: |
        /opt/tomcat/bin/shutdown.sh || true
        sleep 5
        /opt/tomcat/bin/startup.sh
